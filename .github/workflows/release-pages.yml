name: Release & Deploy to Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      release_ref: ${{ steps.release-ref.outputs.release_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare release metadata from tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout -B main origin/main

          TAG_SHA="${GITHUB_SHA}"
          MAIN_SHA="$(git rev-parse HEAD)"
          if [[ "$TAG_SHA" != "$MAIN_SHA" ]]; then
            echo "::error::Release tag must point to the latest commit on main."
            echo "::error::Tag SHA: $TAG_SHA"
            echo "::error::Main SHA: $MAIN_SHA"
            exit 1
          fi

          ./scripts/release.sh --from-tag "${GITHUB_REF_NAME}"
          git push origin HEAD:main

      - name: Resolve release ref
        id: release-ref
        run: echo "release_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release:
    runs-on: ubuntu-latest
    needs: prepare-release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/js-validation.js
            dist/js-validation.min.js
            dist/js-validation.esm.js
            dist/js-validation.esm.min.js

  publish-npm:
    runs-on: ubuntu-latest
    needs: [prepare-release, release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare-release, release, publish-npm]
    if: ${{ always() && !failure() && !cancelled() }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare docs site
        run: |
          mkdir -p public/assets
          cp docs/index.html public/index.html
          cp dist/js-validation.js public/assets/js-validation.js
          cp dist/js-validation.min.js public/assets/js-validation.min.js
          cp dist/js-validation.esm.js public/assets/js-validation.esm.js
          cp dist/js-validation.esm.min.js public/assets/js-validation.esm.min.js
          touch public/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./public
          branch: gh-pages
          clean-exclude: pr-preview
