name: Release & Deploy to Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      release_ref: ${{ steps.release-ref.outputs.release_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare release metadata from tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git checkout -B main origin/main

          TAG_SHA="${GITHUB_SHA}"
          MAIN_SHA="$(git rev-parse HEAD)"
          if [[ "$TAG_SHA" != "$MAIN_SHA" ]]; then
            echo "::error::Release tag must point to the latest commit on main."
            echo "::error::Tag SHA: $TAG_SHA"
            echo "::error::Main SHA: $MAIN_SHA"
            exit 1
          fi

          ./.github/release.sh --from-tag "${GITHUB_REF_NAME}"

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node --input-type=module -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).version);")"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::package.json version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)."
            exit 1
          fi

          if ! grep -q "^## \\[$TAG_VERSION\\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a section for version $TAG_VERSION."
            exit 1
          fi

          git push origin HEAD:main

      - name: Resolve release ref
        id: release-ref
        run: echo "release_ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release:
    runs-on: ubuntu-latest
    needs: prepare-release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read release notes from CHANGELOG
        id: release-notes
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_VERSION="$RELEASE_VERSION" node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const version = process.env.RELEASE_VERSION;
          const githubOutput = process.env.GITHUB_OUTPUT;

          if (!version || !githubOutput) {
            console.error('Missing release note metadata.');
            process.exit(1);
          }

          const lines = changelog.split('\n');
          const headingPrefix = `## [${version}]`;
          const sectionStart = lines.findIndex((line) => line.startsWith(headingPrefix));
          if (sectionStart === -1) {
            console.error(`Unable to find changelog section for ${version}.`);
            process.exit(1);
          }

          const sectionEnd = lines.findIndex(
            (line, index) => index > sectionStart && /^## \[[^\]]+\]/.test(line)
          );

          const releaseNotes = lines
            .slice(sectionStart, sectionEnd === -1 ? lines.length : sectionEnd)
            .join('\n')
            .trim();

          fs.appendFileSync(githubOutput, `release_notes<<EOF\n${releaseNotes}\nEOF\n`);
          NODE

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release-notes.outputs.release_notes }}
          files: |
            dist/js-validation.js
            dist/js-validation.min.js
            dist/js-validation.esm.js
            dist/js-validation.esm.min.js

  publish-npm:
    runs-on: ubuntu-latest
    needs: [prepare-release, release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    outputs:
      publish_status: ${{ steps.publish-status.outputs.publish_status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version already exists on NPM
        id: npm-version-check
        run: |
          VERSION="$(node --input-type=module -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).version);")"
          PACKAGE_NAME="$(node --input-type=module -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).name);")"

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "publish_needed=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already published on NPM. Skipping publish."
          else
            echo "publish_needed=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is not published yet. Proceeding with publish."
          fi

      - name: Publish to NPM
        if: steps.npm-version-check.outputs.publish_needed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Record publish status
        id: publish-status
        run: |
          if [[ "${{ steps.npm-version-check.outputs.publish_needed }}" == "true" ]]; then
            echo "publish_status=published" >> "$GITHUB_OUTPUT"
          else
            echo "publish_status=skipped-already-published" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare-release, release, publish-npm]
    if: ${{ always() && !failure() && !cancelled() }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs-site

      - name: Lint Astro docs
        run: npm run lint
        working-directory: docs-site

      - name: Build Astro docs site
        run: npm run build
        working-directory: docs-site

      - name: Copy dist assets into docs output
        run: |
          mkdir -p _site/assets
          cp dist/js-validation.js _site/assets/js-validation.js
          cp dist/js-validation.min.js _site/assets/js-validation.min.js
          cp dist/js-validation.esm.js _site/assets/js-validation.esm.js
          cp dist/js-validation.esm.min.js _site/assets/js-validation.esm.min.js
          touch _site/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./_site
          branch: gh-pages
          clean-exclude: pr-preview
