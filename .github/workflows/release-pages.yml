name: Release & Deploy to Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/js-validation.js
            dist/js-validation.min.js
            dist/js-validation.esm.js
            dist/js-validation.esm.min.js

  deploy:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !failure() && !cancelled() }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare docs artifact
        run: |
          mkdir -p public/assets
          cp docs/index.html public/index.html
          cp dist/js-validation.js public/assets/js-validation.js
          cp dist/js-validation.min.js public/assets/js-validation.min.js
          cp dist/js-validation.esm.js public/assets/js-validation.esm.js
          cp dist/js-validation.esm.min.js public/assets/js-validation.esm.min.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
