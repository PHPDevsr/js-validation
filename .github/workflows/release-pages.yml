name: Release Docs to Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare docs artifact
        run: |
          mkdir -p public/assets
          cp docs/index.html public/index.html
          cp dist/js-validation.js public/assets/js-validation.js
          cp dist/js-validation.min.js public/assets/js-validation.min.js
          cp dist/js-validation.esm.js public/assets/js-validation.esm.js
          cp dist/js-validation.esm.min.js public/assets/js-validation.esm.min.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
