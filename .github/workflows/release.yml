name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node --input-type=module -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).version);")"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::package.json version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)."
            exit 1
          fi

          if ! grep -q "^## \\[$TAG_VERSION\\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a section for version $TAG_VERSION."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          REPO_NAME="${REPO#*/}"

          # Fetch all tags so we can find the previous one
          git fetch --tags --quiet

          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1 || true)

          # Call GitHub's generate-notes API
          GENERATE_ARGS=(-f "tag_name=${TAG}")
          [[ -n "$PREV_TAG" ]] && GENERATE_ARGS+=(-f "previous_tag_name=${PREV_TAG}")
          AUTO_NOTES=$(gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/releases/generate-notes" \
            "${GENERATE_ARGS[@]}" \
            --jq '.body' 2>/dev/null || echo "")

          # Build the custom release body
          PACKAGE_NAME="$(node --input-type=module -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).name);")"
          export TAG REPO REPO_NAME PREV_TAG AUTO_NOTES PACKAGE_NAME
          node --input-type=module > /tmp/release_body.md <<'JSEOF'
          const tag = process.env.TAG;
          const repo = process.env.REPO;
          const repoName = process.env.REPO_NAME;
          const prevTag = process.env.PREV_TAG || '';
          const autoNotes = process.env.AUTO_NOTES || '';
          const packageName = process.env.PACKAGE_NAME || repoName;

          const newContribMatch = autoNotes.match(/##\s+New Contributors\r?\n([\s\S]*?)(?=\r?\n\r?\n\*\*Full Changelog|\*\*Full Changelog|$)/i);
          const newContribLines = newContribMatch
            ? newContribMatch[1].trim().split('\n').filter(Boolean).map(l => l.trimEnd())
            : [];

          const fullChangelogUrl = prevTag
            ? `https://github.com/${repo}/compare/${prevTag}...${tag}`
            : (() => {
                const m = autoNotes.match(/\*\*Full Changelog\*\*:\s*(https?:\/\/\S+)/);
                return m ? m[1] : null;
              })();

          const lines = [
            `## 🎉 \`${packageName}\` ${tag}`,
            '',
            `> See the full changelog: https://github.com/${repo}/blob/main/CHANGELOG.md`,
          ];

          if (newContribLines.length > 0) {
            lines.push('');
            lines.push('### 🌟 New Contributors');
            newContribLines.forEach(l => lines.push(l));
          }

          if (fullChangelogUrl) {
            lines.push('');
            lines.push(`**Full Changelog**: ${fullChangelogUrl}`);
          }

          process.stdout.write(lines.join('\n') + '\n');
          JSEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body_path: /tmp/release_body.md
          files: |
            dist/js-validation.js
            dist/js-validation.min.js
            dist/js-validation.esm.js
            dist/js-validation.esm.min.js

  publish-npm:
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    outputs:
      publish_status: ${{ steps.publish-status.outputs.publish_status }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version already exists on NPM
        id: npm-version-check
        run: |
          VERSION="$(node --input-type=module -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).version);")"
          PACKAGE_NAME="$(node --input-type=module -e "import fs from 'node:fs'; console.log(JSON.parse(fs.readFileSync('package.json', 'utf8')).name);")"

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "publish_needed=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already published on NPM. Skipping publish."
          else
            echo "publish_needed=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is not published yet. Proceeding with publish."
          fi

      - name: Publish to NPM
        if: steps.npm-version-check.outputs.publish_needed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Record publish status
        id: publish-status
        run: |
          if [[ "${{ steps.npm-version-check.outputs.publish_needed }}" == "true" ]]; then
            echo "publish_status=published" >> "$GITHUB_OUTPUT"
          else
            echo "publish_status=skipped-already-published" >> "$GITHUB_OUTPUT"
          fi
