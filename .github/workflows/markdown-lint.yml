name: Markdown Lint

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'docs/**/*.md'
      - 'docs/*.md'
      - '*.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/markdown-lint.yml'
  push:
    branches: [develop, main]
    paths:
      - 'docs/**/*.md'
      - 'docs/*.md'
      - '*.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/markdown-lint.yml'

concurrency:
  group: markdown-lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            docs/*.md
            *.md

      - name: List changed doc files
        if: github.event_name == 'pull_request'
        id: list-docs
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- 'docs/*.md' '*.md' | head -20)
          TABLE=""
          for f in $FILES; do
            TABLE="${TABLE}| \`${f}\` | [View](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/) |
          "
          done
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$TABLE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post preview link
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: docs-preview
          message: |
            ## 📖 Documentation Preview

            Once merged and deployed, the documentation will be available at:

            🔗 **https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/**

            ### Changed docs in this PR

            | File | Preview after deploy |
            |------|---------------------|
            ${{ steps.list-docs.outputs.files }}
