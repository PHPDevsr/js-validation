name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs-site/**'
      - 'src/**'
      - 'dist/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-docs.yml'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Install docs dependencies
        working-directory: docs-site
        run: npm ci

      - name: Lint Astro docs
        working-directory: docs-site
        run: npm run lint

      - name: Build Astro docs
        working-directory: docs-site
        run: npm run build

      - name: Prepare Pages output
        run: |
          mkdir -p _site/assets
          cp dist/js-validation.js _site/assets/js-validation.js
          cp dist/js-validation.min.js _site/assets/js-validation.min.js
          cp dist/js-validation.esm.js _site/assets/js-validation.esm.js
          cp dist/js-validation.esm.min.js _site/assets/js-validation.esm.min.js
          touch _site/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          folder: ./_site
          branch: gh-pages
          clean: pr-preview