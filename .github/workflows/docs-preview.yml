name: Docs Preview

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs-preview.yml'
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: docs-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  docs-preview:
    runs-on: ubuntu-latest
    concurrency: preview-${{ github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install docs dependencies
        if: github.event.action != 'closed'
        run: npm ci
        working-directory: docs-site

      - name: Lint Astro docs
        if: github.event.action != 'closed'
        run: npm run lint
        working-directory: docs-site

      - name: Build Astro docs site
        if: github.event.action != 'closed'
        run: npm run build
        working-directory: docs-site
        env:
          ASTRO_BASE: /preview-pr-${{ github.event.pull_request.number }}

      - name: Add .nojekyll
        if: github.event.action != 'closed'
        run: touch _site/.nojekyll

      - name: Deploy PR preview
        if: github.event.action != 'closed'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          target-folder: preview-pr-${{ github.event.pull_request.number }}
          clean: true

      - name: Remove PR preview
        if: github.event.action == 'closed'
        run: |
          mkdir -p /tmp/empty-preview
        
      - name: Deploy empty folder to remove preview
        if: github.event.action == 'closed'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: /tmp/empty-preview
          branch: gh-pages
          target-folder: preview-pr-${{ github.event.pull_request.number }}
          clean: true

      - name: Comment PR preview URL
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://js-validation.js.org/preview-pr-${prNumber}/`;
            const body = `📖 **Docs preview deployed:** ${previewUrl}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.data.find(c => c.body.startsWith('📖 **Docs preview deployed:**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

