<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>E2E Test - Minlength Rule</title>
    <style>
      .jsv-invalid { border: 2px solid red; }
    </style>
  </head>
  <body>
    <form id="test-form" novalidate>
      <input name="field" id="field" type="text" />
      <button type="submit" id="submit-btn">Submit</button>
    </form>
    <p id="status"></p>

    <script type="module">
      import jsValidation from '/src/index.js';

      jsValidation('#test-form', {
        rules: {
          field: { required: true, minlength: 5 }
        },
        messages: {
          field: { minlength: 'Please enter at least 5 characters.' }
        }
      }).submit(() => {
        document.getElementById('status').textContent = 'Form submitted successfully!';
      });
    </script>
  </body>
</html>
