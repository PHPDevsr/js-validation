<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>E2E Test - EqualTo Rule</title>
    <style>
      .jsv-invalid { border: 2px solid red; }
    </style>
  </head>
  <body>
    <form id="test-form" novalidate>
      <input name="source" id="source" type="text" />
      <input name="confirm" id="confirm" type="text" />
      <button type="submit" id="submit-btn">Submit</button>
    </form>
    <p id="status"></p>

    <script type="module">
      import jsValidation from '/src/index.js';

      jsValidation('#test-form', {
        rules: {
          source: { required: true },
          confirm: { required: true, equalTo: '#source' }
        },
        messages: {
          confirm: { equalTo: 'Fields do not match.' }
        }
      }).submit(() => {
        document.getElementById('status').textContent = 'Form submitted successfully!';
      });
    </script>
  </body>
</html>
